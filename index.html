<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayşegül</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #f5efe6; /* BEJ */
  color: #2b2b2b;
}

/* HERO GRID */
.hero {
  height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  position: relative;
}

/* LEFT - APPS */
.left {
  display: flex;
  align-items: center;
  justify-content: center;
}

.app-stack img {
  width: 180px;
  border-radius: 20px;
  margin: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* RIGHT CONTENT */
.right {
  padding: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* AI BOX */
.ai-box {
  position: absolute;
  top: 40px;
  right: 40px;
  background: #3e2f23;
  color: white;
  padding: 20px;
  border-radius: 16px;
  width: 220px;
}

.ai-box h3 {
  margin: 0 0 10px;
}

/* TEXT */
h1 {
  font-size: 48px;
}

.subtitle {
  color: #666;
  margin-bottom: 20px;
}

.btn {
  padding: 12px 20px;
  background: #3e2f23;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  width: fit-content;
}

/* PROFILE */
.profile {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
}

.profile img {
  width: 260px;
}

/* INSTAGRAM TAG */
.insta {
  margin-top: 20px;
  font-size: 14px;
  color: #888;
}

</style>
</head>

<body>

<div class="hero">

  <!-- SOL: APP GÖRSELLERİ -->
  <div class="left">
    <div class="app-stack">
      <img src="https://via.placeholder.com/200x400" />
      <img src="https://via.placeholder.com/200x400" />
    </div>
  </div>

  <!-- SAĞ: METİN -->
  <div class="right">
    <h1>Ayşegül</h1>
    <p class="subtitle">iOS Developer • AI Projects</p>

    <p>
      Swift ile mobil uygulamalar geliştiriyorum.
      Aynı zamanda yapay zeka projeleri üzerinde çalışıyorum.
    </p>

    <a href="#" class="btn">Projeleri Gör</a>

    <div class="insta">
      📱 Tech Content Creator • Instagram
    </div>
  </div>

  <!-- AI BOX -->
  <div class="ai-box">
    <h3>AI Projects</h3>
    <p>Machine Learning</p>
    <p>Computer Vision</p>
  </div>

  <!-- FOTO -->
  <div class="profile">
    <img src="https://avatars.githubusercontent.com/u/257825242?v=4" />
  </div>

</div>

</body>
</html>
